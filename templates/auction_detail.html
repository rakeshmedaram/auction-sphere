{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>{{ auction.title }}</h2>

{% if auction.image %}
<img src="{{ url_for('static', filename='uploads/' + auction.image) }}" width="350">
{% endif %}

<p>{{ auction.description }}</p>

<p><strong>Starting Price:</strong> ₹{{ auction.starting_price }}</p>

<hr>

<h4>Place a Bid</h4>

<form method="POST">

<input type="number" name="bid_amount" class="form-control" placeholder="Enter bid amount" required>

<button class="btn btn-primary mt-2">Place Bid</button>

</form>

<hr>

<h4>Bid History</h4>

{% for bid in bids %}

<p>₹{{ bid.amount }}</p>

{% else %}

<p>No bids yet</p>

{% endfor %}

</div>

{% endblock %}
