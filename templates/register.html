{% extends "base.html" %}

{% block content %}

<div class="form-card">
    <h2>Register</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" required placeholder="Username">
        <input type="password" name="password" required placeholder="Password">
        <button>Register</button>
    </form>
</div>

{% endblock %}
