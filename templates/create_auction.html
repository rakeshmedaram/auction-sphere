{% extends "base.html" %}

{% block content %}

<h2>Create Auction</h2>

<form method="POST" enctype="multipart/form-data">

<input type="text"
name="title"
class="form-control mb-3"
placeholder="Title"
required>

<textarea
name="description"
class="form-control mb-3"
placeholder="Description">
</textarea>

<input
type="number"
name="price"
class="form-control mb-3"
placeholder="Starting Price"
required>

<label>Auction End Date & Time</label>

<input
type="datetime-local"
name="end_time"
class="form-control mb-3"
required>

<input
type="file"
name="image"
class="form-control mb-3">

<button class="btn btn-primary">
Create Auction
</button>

</form>

{% endblock %}
