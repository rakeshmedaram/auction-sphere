<!DOCTYPE html>
<html>
<head>
<title>AuctionSphere</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #f0f9ff);
}

/* NAVBAR */
.nav {
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
}

.nav a {
    color: white;
    text-decoration: none;
}

/* CONTAINER */
.container {
    width: 85%;
    margin: 40px auto;
}

/* CARD */
.card {
    display: flex;
    gap: 40px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.image {
    width: 350px;
    height: 350px;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.3s;
}

.image:hover {
    transform: scale(1.05);
}

/* DETAILS */
.details {
    flex: 1;
}

.title {
    font-size: 32px;
    font-weight: 600;
}

.price {
    font-size: 26px;
    color: #2563eb;
    margin: 10px 0;
}

.desc {
    margin: 15px 0;
    color: #555;
    line-height: 1.6;
}

/* TIMER */
.timer {
    font-weight: 500;
    margin-bottom: 10px;
}

/* WINNER */
.winner {
    background: linear-gradient(90deg, gold, orange);
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
    font-weight: bold;
    animation: glow 1s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 10px gold; }
    to { box-shadow: 0 0 20px orange; }
}

/* BID */
.bid-box input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.bid-box button {
    padding: 10px;
    background: linear-gradient(90deg, #2563eb, #1e40af);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* DELETE */
.delete-btn {
    margin-top: 15px;
    display: inline-block;
    background: red;
    color: white;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
}

/* HISTORY */
.history {
    margin-top: 30px;
}

.bid-item {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: white;
    transition: 0.3s;
}

/* NEW BID HIGHLIGHT */
.bid-item.new {
    background: #dbeafe;
    transform: scale(1.02);
}

</style>
</head>

<body>

<div class="nav">
    <h2>AuctionSphere</h2>
    <a href="/">Home</a>
</div>

<div class="container">

    <!-- CARD -->
    <div class="card">

        <img src="{{ url_for('uploaded_file', filename=auction[3]) }}" class="image">

        <div class="details">

            <div class="title">{{ auction[1] }}</div>
            <div class="price" id="price">₹{{ auction[2] }}</div>

            <div class="desc">{{ auction[6] }}</div>

            <div class="timer" id="timer"></div>

            {% if winner %}
                <div class="winner">
                    🏆 Winner: {{ winner[0] }} (₹{{ winner[1] }})
                </div>
            {% endif %}

            {% if not winner %}
            <div class="bid-box">
                <input type="number" id="bid_amount" placeholder="Enter bid">
                <button onclick="placeBid()">Bid</button>
            </div>
            {% endif %}

            <a href="/delete/{{ auction[0] }}" 
               class="delete-btn"
               onclick="return confirm('Delete auction?')">
               Delete
            </a>

        </div>
    </div>

    <!-- HISTORY -->
    <div class="history">
        <h3>Bid History</h3>

        <div id="bids">
            {% for b in bids %}
            <div class="bid-item">
                <span><b>{{ b[0] }}</b> ₹{{ b[1] }}</span>
                <span>{{ b[2] }}</span>
            </div>
            {% endfor %}
        </div>
    </div>

</div>

<script>
const socket = io();

function placeBid(){
    const amount = document.getElementById("bid_amount").value;

    socket.emit("place_bid", {
        auction_id: {{ auction[0] }},
        amount: amount,
        user: "{{ session['user'] }}"
    });
}

socket.on("new_bid", function(data){

    document.getElementById("price").innerText = "₹" + data.amount;

    let div = document.createElement("div");
    div.className = "bid-item new";

    div.innerHTML = `
        <span><b>${data.user}</b> ₹${data.amount}</span>
        <span>${data.time}</span>
    `;

    document.getElementById("bids").prepend(div);
});

socket.on("error", function(data){
    alert(data.msg);
});

/* TIMER */
const end = new Date("{{ auction[4] }}");

setInterval(()=>{
    let now = new Date();
    let diff = end - now;

    if(diff <= 0){
        document.getElementById("timer").innerHTML = "⏱ Ended";
        return;
    }

    let m = Math.floor(diff/60000);
    let s = Math.floor((diff%60000)/1000);

    document.getElementById("timer").innerHTML = `⏱ ${m}m ${s}s`;
},1000);

</script>

</body>
</html>
