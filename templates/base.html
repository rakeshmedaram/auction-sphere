<!DOCTYPE html>
<html>
<head>
<title>Auction Sphere</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">Auction Sphere</a>

<div>

{% if current_user.is_authenticated %}

<span class="text-white me-3">
👤 {{ current_user.username }}
</span>

<a href="/dashboard" class="btn btn-warning">Dashboard</a>
<a href="/create-auction" class="btn btn-success">+ Create</a> <!-- ✅ ADDED -->
<a href="/analytics" class="btn btn-info">Analytics</a>
<a href="/profile" class="btn btn-secondary">Profile</a>
<a href="/logout" class="btn btn-danger">Logout</a>

{% else %}

<a href="/login" class="btn btn-success">Login</a>
<a href="/register" class="btn btn-primary">Register</a>

{% endif %}

</div>

</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</body>
</html>
