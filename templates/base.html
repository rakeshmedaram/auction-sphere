<!DOCTYPE html>
<html>
<head>
    <title>Auction Sphere</title>

    <style>
    body{
        margin:0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #dbeafe, #e0f2fe);
        color:#1e293b;
    }

    nav{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 30px;
        backdrop-filter: blur(10px);
        background: rgba(255,255,255,0.4);
        border-bottom:1px solid rgba(255,255,255,0.3);
    }

    nav a{
        margin:0 10px;
        text-decoration:none;
        color:#1e3a8a;
        font-weight:500;
    }

    nav a:hover{
        color:#2563eb;
    }

    .container{
        padding:30px;
    }

    /* FLASH MESSAGE */
    .flash{
        background:#d1fae5;
        padding:12px;
        border-radius:8px;
        margin-bottom:15px;
        color:#065f46;
    }
    </style>
</head>

<body>

<nav>
    <h2>💎 Auction Sphere</h2>

    <div>
        {% if current_user.is_authenticated %}
            <a href="/">Home</a>
            <a href="/create">Create</a>
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container">

    <!-- ✅ FLASH MESSAGES -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
