<!DOCTYPE html>
<html>
<head>
    <title>AuctionSphere</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>AuctionSphere</h2>

    <div class="nav-right">
        {% if user %}
            <span>{{ user }}</span>
            <a href="/create_auction">Sell</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
