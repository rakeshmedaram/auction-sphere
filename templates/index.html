{% extends "base.html" %}

{% block content %}

<h2>Live Auctions</h2>

<div class="grid">
    {% for a in auctions %}
    <a href="/auction/{{ a.id }}" class="card">
        <img src="{{ url_for('static', filename='uploads/' + (a.image or 'default.png')) }}">
        <h3>{{ a.name }}</h3>
        <p>₹{{ a.price }}</p>
    </a>
    {% endfor %}
</div>

{% endblock %}
