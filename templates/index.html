{% extends "base.html" %}

{% block content %}

<h2>Live Auctions</h2>

<div class="grid">
    {% for a in auctions %}
    <a href="/auction/{{ a.id }}" class="card">
        <img src="/uploads/default.png">
        <h3>{{ a.name }}</h3>
        <p>₹{{ a.price }}</p>
    </a>
    {% endfor %}
</div>

{% endblock %}
